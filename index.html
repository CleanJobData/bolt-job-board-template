<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanJobData — Find Your Next Dream Job</title>
    <meta name="description" content="Discover curated job opportunities for data professionals, engineers, and designers. Structured job data for the modern workforce." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function(){
        try {
          var k = 'cleanjobdata-theme';
          var t = localStorage.getItem(k);
          var d = document.documentElement;
          var dark = false;
          if (t === 'dark') dark = true;
          else if (t === 'light') dark = false;
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches) dark = true;
          if (dark) d.classList.add('dark'); else d.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
